name: Test

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go: ["1.24"]
      fail-fast: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: false

      - name: Build
        run: go build ./...

      - name: Unit tests
        run: go test -race -count=1 -timeout 120s ./...

  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: false

      - name: Reject TODO-skipped tests
        run: |
          if grep -R 't.Skip("TODO: implement")' internal; then
            echo "TODO-skipped tests must be implemented before CI can pass"
            exit 1
          fi

      - name: Vet
        run: go vet ./...
